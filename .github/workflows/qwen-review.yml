name: Qwen Code Review

on:
  pull_request:
    branches:
      - main
      - dev
      - build-984-hardening

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        
      - name: Qwen PR Review via OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.QWEN_TOKEN || secrets.DASHSCOPE_API_KEY }}
          OPENAI_BASE_URL: https://dashscope.aliyuncs.com/compatible-mode/v1
        with:
          model: qwen-plus
          use_github_token: true
          prompt: |
            Review this pull request focusing on C# logic, NinjaTrader conventions, and high-performance practices.
