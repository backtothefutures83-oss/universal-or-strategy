[[analyzers]]
name = "csharp"
enabled = true

[analyzers.meta]
lang_version = "8.0"

exclude_patterns = [
    "docs/**",
    ".github/**",
    "scripts/**",
    "**/*.md",
    "**/*.py",
    "**/*.ps1",
    "**/*.bat",
    "**/*.json",
    "**/*.yaml",
    "**/*.yml",
    ".agent/**",
    ".agents/**",
    ".bob/**",
    ".codex/**",
    ".cursor/**",
    ".gemini/**",
    ".antigravitycli/**",
    "Traycerrefactor/**",
    "artifacts/**",
    "benchmarks/**"
]
