name: Jules PR Review (Sovereign Auditor)

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

jobs:
  jules-review:
    name: Jules AI (Forensic Audit)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "20"

      - name: Diagnostic Environment
        run: |
          node -v
          npm -v

      - name: Install Jules SDK
        run: npm install @google/jules-sdk

      - name: Run Jules Forensic Audit (CLI)
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
        run: |
          echo "Triggering Jules via official CLI..."
          npx @google/jules-sdk audit --branch ${{ github.event.pull_request.head.ref || github.head_ref }} --repo ${{ github.repository }}
