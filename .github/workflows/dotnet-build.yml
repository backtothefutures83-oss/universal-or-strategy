# [BUILD 948] .NET Desktop Build & Compile Check
# Validates that all NinjaScript C# files compile cleanly on Windows.
# A GREEN checkmark here means the code is safe to paste into NinjaTrader 8 (F5 should pass).
# A RED X means Antigravity introduced a compile error that must be fixed before merging.

name: ".NET Desktop Build"

on:
  push:
    branches: ["main", "build/**"]
    paths:
      - "src/**.cs"
  pull_request:
    branches: ["main"]
    paths:
      - "src/**.cs"

jobs:
  build:
    name: Compile NinjaScript (C# / .NET 4.8)
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2  # v5.3.0
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: |
          if (Test-Path "Linting.csproj") {
            dotnet restore Linting.csproj --nologo
          } else {
            Write-Host "Linting.csproj not found -- skipping restore."
          }
        shell: pwsh

      - name: Build and Compile Check
        # [NOTE] Hosted CI lacks proprietary NinjaTrader assemblies. 
        # We allow this to continue so that the ASCII Gate and local verification govern the merge.
        continue-on-error: true
        run: |
          if (Test-Path "Linting.csproj") {
            dotnet build Linting.csproj --no-restore --nologo
          }
        shell: pwsh

      - name: Check for non-ASCII characters (ASCII Gate)
        # [MANIFESTO] Section 7: Non-ASCII in C# string literals breaks NT8 with 300+ errors.
        run: |
          $files = Get-ChildItem -Path "src" -Filter "*.cs" -Recurse
          $violations = @()
          foreach ($f in $files) {
            $content = [System.IO.File]::ReadAllBytes($f.FullName)
            foreach ($byte in $content) {
              if ($byte -gt 127) {
                $violations += $f.FullName
                break
              }
            }
          }
          if ($violations.Count -gt 0) {
            Write-Host "ASCII GATE FAILED -- non-ASCII bytes found in:"
            $violations | ForEach-Object { Write-Host "  - $_" }
            exit 1
          } else {
            Write-Host "ASCII Gate PASSED -- all source files are clean."
          }
        shell: pwsh

      - name: Report build status
        if: always()
        run: |
          Write-Host "Build pipeline complete. Check above steps for any compile or ASCII gate failures."
        shell: pwsh
