name: Jules PR Review (Sovereign Auditor)

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'src/**/*.cs'
      - 'tests/**/*.cs'
  issue_comment:
    types: [created]

jobs:
  jules-review:
    name: Jules AI (Forensic Audit)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "20"

      - name: Run Jules Forensic Audit
        id: jules_audit
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
          BRANCH: ${{ github.event.pull_request.head.ref || github.head_ref || github.ref_name }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          cat << 'EOF' > jules_audit.js
          const fs = require('fs');
          const { execSync } = require('child_process');

          async function githubRequest(path, method, data, token) {
            const url = `https://api.github.com${path}`;
            const res = await fetch(url, {
              method,
              headers: {
                'Authorization': `Bearer ${token}`,
                'User-Agent': 'jules-auditor',
                'Accept': 'application/vnd.github+json',
                'Content-Type': 'application/json'
              },
              body: data ? JSON.stringify(data) : undefined
            });
            if (!res.ok) throw new Error(`GitHub Error (${res.status}): ${await res.text()}`);
            return await res.json();
          }

          async function run() {
            const apiKey = (process.env.JULES_API_KEY || "").trim();
            const githubToken = process.env.GITHUB_TOKEN;
            const repo = process.env.REPO;
            const sha = process.env.SHA;
            const prTitle = process.env.PR_TITLE;
            const eventPath = process.env.GITHUB_EVENT_PATH;
            const event = JSON.parse(fs.readFileSync(eventPath, 'utf8'));

            let prNumber = process.env.PR_NUMBER;
            let branch = process.env.BRANCH;
            let isComment = (process.env.GITHUB_EVENT_NAME === 'issue_comment');

            if (isComment) {
              if (!event.issue.pull_request) return;
              prNumber = event.issue.number;
              branch = execSync(`gh pr view ${prNumber} --json headRefName -q .headRefName`, { encoding: 'utf8' }).trim();
            }

            // 1. Create Native Check Run
            const checkRun = await githubRequest(`/repos/${repo}/check-runs`, 'POST', {
              name: 'Jules Forensic Audit',
              head_sha: sha,
              status: 'in_progress',
              started_at: new Date().toISOString()
            }, githubToken);

            // 2. Trigger Jules AI (Isolated fetch to prevent header bleeding)
            const prompt = `Perform a forensic logic audit of PR "${prTitle || branch}" on branch "${branch}". Rules: 1. Lock-Free Actor Pattern (Enqueue). 2. ASCII-Only strings. Identify specific line numbers for any violations.`;
            const triggerData = {
              prompt: prompt,
              sourceContext: { source: `sources/github/${repo}`, githubRepoContext: { startingBranch: branch } },
              title: `Audit: ${prTitle || `PR #${prNumber}`}`
            };

            const triggerRes = await fetch('https://jules.googleapis.com/v1alpha/sessions', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'x-goog-api-key': apiKey
              },
              body: JSON.stringify(triggerData)
            });

            if (!triggerRes.ok) {
              const errText = await triggerRes.text();
              console.error(`Jules Trigger Failed (401):\n${errText}`);
              process.exit(1);
            }

            const session = await triggerRes.json();
            console.log(`Jules Session: ${session.url}`);

            // 3. Poll for Completion
            let finished = false;
            let finalSummary = "Audit complete. Check trace for details.";
            let conclusion = "success";

            while (!finished) {
              const pollRes = await fetch(`https://jules.googleapis.com/v1alpha/${session.name}/activities?pageSize=100`, {
                method: 'GET',
                headers: { 'x-goog-api-key': apiKey }
              });
              
              if (!pollRes.ok) throw new Error(`Polling failed: ${await pollRes.text()}`);
              
              const activities = await pollRes.json();
              if (activities && activities.activities) {
                const completed = activities.activities.find(a => a.sessionCompleted);
                const failed = activities.activities.find(a => a.sessionFailed);
                for (const act of activities.activities) {
                  if (act.progressUpdated) finalSummary = act.progressUpdated.description;
                }
                if (completed || failed) {
                  finished = true;
                  conclusion = failed ? "failure" : (finalSummary.includes('FAIL') ? "failure" : "success");
                }
              }

              if (!finished) await new Promise(r => setTimeout(r, 20000));
            }

            // 4. Update Check Run (Native UI)
            await githubRequest(`/repos/${repo}/check-runs/${checkRun.id}`, 'PATCH', {
              status: 'completed',
              conclusion: conclusion,
              completed_at: new Date().toISOString(),
              output: {
                title: 'Jules Forensic Audit Result',
                summary: finalSummary,
                text: `[Full Forensic Trace](${session.url})`
              }
            }, githubToken);

            console.log(`Audit complete: ${conclusion}`);
          }

          run().catch(e => { console.error(e); process.exit(1); });
          EOF
          node jules_audit.js
