name: Jules PR Review (Sovereign Auditor)

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "src/**.cs"

jobs:
  jules-review:
    name: Jules AI (Forensic Audit)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "20"

      - name: Run Jules Forensic Audit
        id: jules_audit
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.head_ref }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          cat << 'EOF' > jules_audit.js
          const https = require('https');
          const fs = require('fs');

          async function run() {
            const apiKey = process.env.JULES_API_KEY;
            const repo = process.env.REPO;
            const branch = process.env.BRANCH;
            const prTitle = process.env.PR_TITLE;

            if (!apiKey) {
              console.error('Error: JULES_API_KEY secret is not set.');
              process.exit(1);
            }

            const prompt = `You are the Jules PR Auditor (Sovereign Agent Protocol). Perform a forensic logic audit of this PR: "${prTitle}".
          Reference institutional standards in AGENTS.md and JULES.md.
          Rules:
          1. Lock-Free Actor Pattern: BANNED legacy lock(stateLock). Use Enqueue().
          2. ASCII-Only Compliance: BANNED Unicode/emoji in C# string literals.
          3. FSM Follower Replace Pattern: Mandatory for order management.
          4. Surgical Implementation: Verify minimum code changes.
          Post your findings as inline comments on the PR code using your GitHub integration.
          Final Audit Verdict: PASS or FAIL.`;

            const data = JSON.stringify({
              prompt: prompt,
              sourceContext: {
                source: `sources/github/${repo}`,
                githubRepoContext: {
                  startingBranch: branch
                }
              },
              automationMode: "AUTO_CREATE_PR",
              title: `Jules Audit: ${prTitle}`
            });

            const options = {
              hostname: 'jules.googleapis.com',
              path: '/v1alpha/sessions',
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'x-goog-api-key': apiKey
              }
            };

            console.log(`Triggering Jules session for ${repo} on branch ${branch}...`);

            const req = https.request(options, (res) => {
              let body = '';
              res.on('data', (chunk) => body += chunk);
              res.on('end', () => {
                if (res.statusCode >= 200 && res.statusCode < 300) {
                  const response = JSON.parse(body);
                  console.log(`Success: Jules session created. Name: ${response.name}`);
                  console.log(`Session URL: https://jules.google.com/session/${response.name.split('/').pop()}`);
                  fs.writeFileSync('jules_session.txt', response.name);
                } else {
                  console.error(`Error: Jules API returned ${res.statusCode}`);
                  console.error(body);
                  process.exit(1);
                }
              });
            });

            req.on('error', (e) => {
              console.error(`Error: ${e.message}`);
              process.exit(1);
            });

            req.write(data);
            req.end();
          }

          run();
          EOF
          node jules_audit.js

      - name: Wait for Jules Result (Optional)
        if: success()
        run: |
          echo "Jules audit session triggered successfully. Jules will post comments directly to the PR."
          echo "Check the session log in the previous step for the direct URL."
