name: Codacy Coverage

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  coverage:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup .NET Framework
        uses: microsoft/setup-msbuild@v1.1
      
      - name: Restore NuGet packages
        run: nuget restore Linting.csproj
      
      - name: Build project
        run: msbuild Linting.csproj /p:Configuration=Release
      
      - name: Install Coverlet.Console
        run: dotnet tool install --global coverlet.console
      
      - name: Check for test projects
        id: check_tests
        run: |
          if (Test-Path "tests/*.csproj") {
            echo "has_tests=true" >> $env:GITHUB_OUTPUT
          } else {
            echo "has_tests=false" >> $env:GITHUB_OUTPUT
            echo "No test projects found - skipping coverage"
          }
        shell: powershell
      
      - name: Run tests with coverage
        if: steps.check_tests.outputs.has_tests == 'true'
        run: |
          coverlet ".\bin\Release\Linting.dll" `
            --target "dotnet" `
            --targetargs "test Linting.csproj --no-build --configuration Release" `
            --format cobertura `
            --output "./coverage/coverage.cobertura.xml"
        shell: powershell
      
      - name: Upload coverage to Codacy
        if: steps.check_tests.outputs.has_tests == 'true'
        env:
          CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
        run: |
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -Uri "https://coverage.codacy.com/get.sh" -OutFile "codacy-coverage.sh"
          bash codacy-coverage.sh report -r ./coverage/coverage.cobertura.xml
        shell: powershell
      
      - name: Skip coverage (no tests)
        if: steps.check_tests.outputs.has_tests == 'false'
        run: echo "Skipping coverage - no test projects found"
        shell: powershell

