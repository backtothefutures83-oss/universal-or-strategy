name: GLM OpenCode Review

on:
  pull_request:
    branches:
      - main
      - dev
      - build-984-hardening

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
          submodules: false
        
      - name: GLM PR Review via OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ZHIPUAI_API_KEY: ${{ secrets.GLM_API_KEY }}
        with:
          model: zhipuai/glm-5.1
          use_github_token: true
          prompt: |
            Review this pull request focusing on C# logic, NinjaTrader conventions, and high-performance practices.
