name: Mise CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    name: Build and Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Mise
        uses: jdx/mise-action@v2
        with:
          install: true
          cache: true
      
      - name: Verify Mise installation
        run: mise --version
      
      - name: Install .NET SDK 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      
      - name: Verify .NET installation
        run: dotnet --version
      
      - name: Install Python and Node dependencies
        run: mise run install
      
      - name: Build C# project
        run: mise run build
      
      - name: Run C# tests
        run: mise run test
      
      - name: Run linting
        run: mise run lint
        continue-on-error: true
      
      - name: Check code formatting
        run: mise run format-check
        continue-on-error: true
      
      - name: Run complexity audit
        run: mise run complexity
        continue-on-error: true
      
      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ matrix.os }}
          path: |
            bin/
            obj/
            *.log
          retention-days: 7

  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Mise
        uses: jdx/mise-action@v2
        with:
          install: true
          cache: true
      
      - name: Install .NET SDK 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      
      - name: Install dependencies
        run: mise run install
      
      - name: Run pre-push validation (fast mode)
        run: mise run pre-push-fast
        continue-on-error: true
      
      - name: Run security audit
        run: mise run audit
        continue-on-error: true
      
      - name: Scan for dead code
        run: mise run dead-code
        continue-on-error: true
      
      - name: Upload quality reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports
          path: |
            complexity_audit_report.txt
            dead_code_report.txt
            lint_errors.txt
          retention-days: 30

  integration-test:
    name: Integration Test (Phoenix + Firebase)
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Mise
        uses: jdx/mise-action@v2
        with:
          install: true
          cache: true
      
      - name: Install dependencies
        run: mise run install
      
      - name: Start Phoenix server
        run: |
          mise run phoenix &
          sleep 10
      
      - name: Test Phoenix tracer
        run: mise run -- python .bob/hooks/phoenix_tracer.py
        continue-on-error: true
      
      - name: Test Compound Intelligence logger
        run: mise run -- python .bob/hooks/compound_intelligence_logger.py
        continue-on-error: true
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.FIREBASE_KEY }}
      
      - name: Check Phoenix health
        run: curl -f http://localhost:6006 || echo "Phoenix not responding"
        continue-on-error: true
      
      - name: Upload integration logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-logs
          path: |
            .agent/bootstrap/*.md
            *.log
          retention-days: 7

# Made with Bob
