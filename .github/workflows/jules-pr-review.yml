name: Jules PR Review (Sovereign Auditor)

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

jobs:
  jules-review:
    name: Jules AI (Forensic Audit)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "20"

      - name: Diagnostic Environment
        run: |
          node -v
          npm -v

      - name: Install Jules SDK
        run: npm install @google/jules-sdk

      - name: Run Jules Forensic Audit (Official SDK)
        id: jules_audit
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
          BRANCH: ${{ github.event.pull_request.head.ref || github.head_ref || github.ref_name }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          cat << 'EOF' > jules_sdk_audit.mjs
          import { jules } from '@google/jules-sdk';
          import fs from 'fs';
          import { execSync } from 'child_process';

          async function githubRequest(path, method, data, token) {
            const res = await fetch(`https://api.github.com${path}`, {
              method,
              headers: {
                'Authorization': `Bearer ${token}`,
                'User-Agent': 'jules-auditor',
                'Accept': 'application/vnd.github+json',
                'Content-Type': 'application/json'
              },
              body: data ? JSON.stringify(data) : undefined
            });
            if (!res.ok) throw new Error(`GitHub Error (${res.status}): ${await res.text()}`);
            return await res.json();
          }

          async function run() {
            console.log("Jules Auditor Starting...");
            const apiKey = (process.env.JULES_API_KEY || "").trim();
            const githubToken = process.env.GITHUB_TOKEN;
            const repo = process.env.REPO;
            const sha = process.env.SHA;
            const prTitle = process.env.PR_TITLE;
            const branch = process.env.BRANCH;

            if (!apiKey) throw new Error("JULES_API_KEY is missing!");

            // 1. Create Native Check Run
            const checkRun = await githubRequest(`/repos/${repo}/check-runs`, 'POST', {
              name: 'Jules Forensic Audit',
              head_sha: sha,
              status: 'in_progress',
              started_at: new Date().toISOString()
            }, githubToken);

            try {
              console.log(`Starting Official SDK Audit for branch: ${branch}...`);
              
              // 2. Execute Audit via Official SDK
              const agent = jules.with({ apiKey });
              const session = await agent.session({
                prompt: `Perform a forensic logic audit of branch "${branch}". Rules: 1. Lock-Free Actor Pattern (Enqueue). 2. ASCII-Only strings. identify specific lines for any violations. Output a summary.`,
                source: {
                  github: repo,
                  baseBranch: branch
                }
              });

              const outcome = await session.result();
              const finalSummary = outcome.summary || "Audit complete.";
              
              console.log(`Audit finished with state: ${outcome.state}`);

              // 3. Finalize Check Run
              await githubRequest(`/repos/${repo}/check-runs/${checkRun.id}`, 'PATCH', {
                status: 'completed',
                conclusion: outcome.state === 'COMPLETED' ? 'success' : 'failure',
                completed_at: new Date().toISOString(),
                output: {
                  title: 'Jules Forensic Audit Result',
                  summary: finalSummary,
                  text: `[View Native Trace](${session.url})`
                }
              }, githubToken);

            } catch (e) {
              console.error(`Audit Error: ${e.message}`);
              await githubRequest(`/repos/${repo}/check-runs/${checkRun.id}`, 'PATCH', {
                status: 'completed',
                conclusion: 'failure',
                output: {
                  title: 'Jules Audit Failed',
                  summary: `Internal Error: ${e.message}`
                }
              }, githubToken);
              process.exit(1);
            }
          }

          run().catch(e => { console.error(e); process.exit(1); });
          EOF
          node jules_sdk_audit.mjs
