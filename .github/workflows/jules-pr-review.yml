name: Jules PR Review (Sovereign Auditor)

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

jobs:
  jules-review:
    name: Jules AI (Forensic Audit)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "20"

      - name: Run Jules Forensic Audit (REST API)
        id: jules_audit
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
          BRANCH: ${{ github.event.pull_request.head.ref || github.head_ref || github.ref_name }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          cat << 'EOF' > jules_audit.js
          const https = require('https');
          const fs = require('fs');

          async function request(options, data) {
            return new Promise((resolve, reject) => {
              const req = https.request(options, (res) => {
                let body = '';
                res.on('data', (chunk) => body += chunk);
                res.on('end', () => {
                  if (res.statusCode >= 200 && res.statusCode < 300) {
                    resolve(body ? JSON.parse(body) : {});
                  } else {
                    reject(new Error(`Request failed (${res.statusCode}): ${body}`));
                  }
                });
              });
              req.on('error', reject);
              if (data) req.write(data);
              req.end();
            });
          }

          async function run() {
            const apiKey = (process.env.JULES_API_KEY || "").trim();
            const githubToken = process.env.GITHUB_TOKEN;
            const repo = process.env.REPO;
            const sha = process.env.SHA;
            const prTitle = process.env.PR_TITLE;
            const branch = process.env.BRANCH;

            // 1. Create Native GitHub Check Run
            const checkOptions = {
              hostname: 'api.github.com',
              path: `/repos/${repo}/check-runs`,
              method: 'POST',
              headers: {
                'Authorization': `token ${githubToken}`,
                'User-Agent': 'jules-auditor',
                'Accept': 'application/vnd.github+json',
                'Content-Type': 'application/json'
              }
            };
            
            const checkRun = await request(checkOptions, JSON.stringify({
              name: 'Jules Forensic Audit',
              head_sha: sha,
              status: 'in_progress',
              started_at: new Date().toISOString()
            }));

            console.log("GitHub Check Run Created.");

            // 2. Trigger Jules AI via REST API (Documented Pattern)
            const prompt = `Perform a forensic logic audit of PR branch "${branch}". Rules: 1. Lock-Free Actor Pattern (Enqueue). 2. ASCII-Only strings. identify specific lines for any violations. Output a summary.`;
            const triggerData = JSON.stringify({
              prompt: prompt,
              sourceContext: { 
                source: `sources/github/${repo}`, 
                githubRepoContext: { startingBranch: branch } 
              },
              title: `Audit: ${prTitle || branch}`
            });

            const triggerOptions = {
              hostname: 'jules.googleapis.com',
              path: '/v1alpha/sessions',
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'X-Goog-Api-Key': apiKey
              }
            };

            console.log("Triggering Jules AI Session...");
            const session = await request(triggerOptions, triggerData);
            console.log(`Jules Session Created: ${session.name}`);

            // 3. Poll for Completion
            let finished = false;
            let finalSummary = "Audit complete. Check Jules trace for details.";
            let conclusion = "success";
            const pollOptions = {
              hostname: 'jules.googleapis.com',
              path: `/v1alpha/${session.name}/activities?pageSize=100`,
              method: 'GET',
              headers: { 'X-Goog-Api-Key': apiKey }
            };

            while (!finished) {
              const activities = await request(pollOptions);
              if (activities && activities.activities) {
                const completed = activities.activities.find(a => a.sessionCompleted);
                const failed = activities.activities.find(a => a.sessionFailed);
                
                for (const act of activities.activities) {
                  if (act.progressUpdated) finalSummary = act.progressUpdated.description;
                }

                if (completed || failed) {
                  finished = true;
                  conclusion = failed ? "failure" : (finalSummary.includes('FAIL') ? "failure" : "success");
                }
              }

              if (!finished) {
                process.stdout.write(".");
                await new Promise(r => setTimeout(r, 20000));
              }
            }

            console.log(`\nJules Audit Finished: ${conclusion}`);

            // 4. Update GitHub Check Run
            const updateOptions = {
              hostname: 'api.github.com',
              path: `/repos/${repo}/check-runs/${checkRun.id}`,
              method: 'PATCH',
              headers: {
                'Authorization': `token ${githubToken}`,
                'User-Agent': 'jules-auditor',
                'Accept': 'application/vnd.github+json',
                'Content-Type': 'application/json'
              }
            };

            await request(updateOptions, JSON.stringify({
              status: 'completed',
              conclusion: conclusion,
              completed_at: new Date().toISOString(),
              output: {
                title: 'Jules Forensic Audit Result',
                summary: finalSummary,
                text: `[Full Forensic Trace](https://jules.google.com/session/${session.id})`
              }
            }));

            console.log("GitHub Check Run Updated.");
          }

          run().catch(e => { 
            console.error(`\nFATAL ERROR: ${e.message}`); 
            process.exit(1); 
          });
          EOF
          node jules_audit.js
