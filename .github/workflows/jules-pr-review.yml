      - name: Run Jules Forensic Audit (Indestructible Mode)
        id: jules_audit
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
          BRANCH: ${{ github.event.pull_request.head.ref || github.head_ref || github.ref_name }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          cat << 'EOF' > jules_audit.js
          const https = require('https');
          const fs = require('fs');

          async function githubRequest(path, method, data, token) {
            const options = {
              hostname: 'api.github.com',
              path: path,
              method: method,
              headers: {
                'Authorization': `token ${token}`,
                'User-Agent': 'jules-auditor',
                'Accept': 'application/vnd.github+json',
                'Content-Type': 'application/json'
              }
            };
            return new Promise((resolve, reject) => {
              const req = https.request(options, (res) => {
                let body = '';
                res.on('data', (chunk) => body += chunk);
                res.on('end', () => {
                  if (res.statusCode >= 200 && res.statusCode < 300) resolve(body ? JSON.parse(body) : {});
                  else reject(new Error(`GitHub Request Failed (${res.statusCode}): ${body}`));
                });
              });
              req.on('error', reject);
              if (data) req.write(JSON.stringify(data));
              req.end();
            });
          }

          async function julesRequest(options, data, apiKey) {
            const fullOptions = {
              ...options,
              headers: {
                ...options.headers,
                'Content-Type': 'application/json',
                'X-Goog-Api-Key': apiKey
              }
            };
            return new Promise((resolve, reject) => {
              const req = https.request(fullOptions, (res) => {
                let body = '';
                res.on('data', (chunk) => body += chunk);
                res.on('end', () => {
                  if (res.statusCode >= 200 && res.statusCode < 300) resolve(JSON.parse(body));
                  else reject(new Error(`Jules API Error (${res.statusCode}): ${body}`));
                });
              });
              req.on('error', reject);
              if (data) req.write(data);
              req.end();
            });
          }

          async function run() {
            const apiKey = (process.env.JULES_API_KEY || "").trim();
            const githubToken = process.env.GITHUB_TOKEN;
            const repo = process.env.REPO;
            const sha = process.env.SHA;
            const prTitle = process.env.PR_TITLE;
            const branch = process.env.BRANCH;

            // 1. Create Native Check Run
            const checkRun = await githubRequest(`/repos/${repo}/check-runs`, 'POST', {
              name: 'Jules Forensic Audit',
              head_sha: sha,
              status: 'in_progress',
              started_at: new Date().toISOString()
            }, githubToken);

            let conclusion = "failure";
            let finalSummary = "Audit failed to initialize.";
            let sessionName = "";

            try {
              if (!apiKey) throw new Error("JULES_API_KEY secret is missing or empty.");

              // 2. Trigger Jules AI
              console.log("Triggering Jules AI Session...");
              const triggerData = JSON.stringify({
                prompt: `Perform a forensic logic audit of PR branch "${branch}". Rules: 1. Lock-Free Actor Pattern (Enqueue). 2. ASCII-Only strings. Identify violations.`,
                sourceContext: { source: `sources/github/${repo}`, githubRepoContext: { startingBranch: branch } }
              });

              const session = await julesRequest({ hostname: 'jules.googleapis.com', path: '/v1alpha/sessions', method: 'POST' }, triggerData, apiKey);
              sessionName = session.name;
              console.log(`Session Created: ${sessionName}`);

              // 3. Poll for Completion
              let finished = false;
              while (!finished) {
                const activities = await julesRequest({ hostname: 'jules.googleapis.com', path: `/v1alpha/${sessionName}/activities?pageSize=100`, method: 'GET' }, null, apiKey);
                const completed = activities.activities.find(a => a.sessionCompleted);
                const failed = activities.activities.find(a => a.sessionFailed);
                
                for (const act of activities.activities) {
                  if (act.progressUpdated) finalSummary = act.progressUpdated.description;
                }

                if (completed || failed) {
                  finished = true;
                  conclusion = failed ? "failure" : (finalSummary.includes('FAIL') ? "failure" : "success");
                } else {
                  process.stdout.write(".");
                  await new Promise(r => setTimeout(r, 20000));
                }
              }
            } catch (e) {
              console.error(`FATAL ERROR: ${e.message}`);
              finalSummary = `**Audit Crash**: ${e.message}\n\n**Common Fixes**:\n1. If 401: Generate a fresh key at jules.google/settings#api.\n2. Ensure key starts with 'AIza...'.`;
              conclusion = "failure";
            } finally {
              // 4. ALWAYS Update Check Run (The Fix for the 'Pending' bug)
              console.log(`\nFinalizing Check Run with conclusion: ${conclusion}`);
              await githubRequest(`/repos/${repo}/check-runs/${checkRun.id}`, 'PATCH', {
                status: 'completed',
                conclusion: conclusion,
                completed_at: new Date().toISOString(),
                output: {
                  title: 'Jules Forensic Audit Result',
                  summary: finalSummary,
                  text: sessionName ? `[Full Forensic Trace](https://jules.google.com/session/${sessionName.split('/')[1]})` : "Session failed to start."
                }
              }, githubToken);
            }
          }

          run();
          EOF
          node jules_audit.js
