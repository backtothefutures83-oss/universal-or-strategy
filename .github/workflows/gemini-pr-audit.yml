name: Gemini PR Auditor

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  gemini-audit:
    name: Gemini 3.1 Pro (Meta-Purge Audit)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract PR diff
        id: diff
        run: |
          git diff origin/${{ github.event.pull_request.base.ref }}...HEAD > pr.diff

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: "${{ secrets.GCP_CREDENTIALS }}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vertex AI SDK
        run: npm install @google-cloud/vertexai

      - name: Run Vertex AI Audit and Post Comment
        uses: actions/github-script@v7
        env:
          GCP_PROJECT_ID: "project-263b6139-6893-4788-995"
          GCP_REGION: "us-east4"
        with:
          script: |
            const fs = require('fs');
            const { VertexAI } = require('@google-cloud/vertexai');

            const diffContent = fs.readFileSync('pr.diff', 'utf8');
            let geminiMdContent = '';
            try {
              geminiMdContent = fs.readFileSync('GEMINI.md', 'utf8');
            } catch (e) {
              console.log('GEMINI.md not found in the root directory, proceeding without it.');
            }

            const prompt = `You are the Lead Software Architect (Gemini 3.1 Pro) performing an automated forensic audit.
            Your task is to analyze the following PR diff against our project's GEMINI.md standards.
            
            MISSION BRIEF:
            - Verify the Build 973 Meta-Purge Fix.
            - Ensure the FSM-Aware Guard in AccountOrders.cs correctly rescues PendingCancel specs.
            - Verify BUILD_TAG is 973.
            - Check for ASCII-ONLY string literals.
            - Verify that stateLock is used for all state mutations.

            GEMINI.md context:
            ${geminiMdContent}

            PR DIFF:
            ${diffContent}

            Provide a systematic review:
            1. Evaluate adherence to Build 973 specifications.
            2. Identify any logic gaps or safety violations.
            3. Final Verdict: PASS or FAIL.`;

            const vertex_ai = new VertexAI({project: process.env.GCP_PROJECT_ID, location: process.env.GCP_REGION});
            const generativeModel = vertex_ai.getGenerativeModel({
              model: 'gemini-1.5-pro-002',
            });

            let reviewText = '';
            try {
              const resp = await generativeModel.generateContent({
                contents: [{role: 'user', parts: [{text: prompt}]}],
              });
              reviewText = resp.response.candidates[0].content.parts[0].text;
            } catch (error) {
              console.error("Error calling Vertex AI API:", error);
              reviewText = "⚠️ **Vertex AI Audit Failed to Execute**: " + error.message;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "### 🤖 Antigravity Automated Auditor (Gemini 3.1 Pro via Vertex AI)\n\n" + reviewText
            });
